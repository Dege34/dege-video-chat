<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dege Video Chat — Room</title>
    <meta name="description" content="Dege video chat room">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="room-page">
    <!-- Username modal (for link-join users) -->
    <div id="usernameModal" class="modal-overlay" style="display:none;">
        <div class="glass-card modal-card">
            <div class="brand-icon small">
                <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="14" fill="url(#grad2)"/>
                    <path d="M14 18C14 16.8954 14.8954 16 16 16H22C23.1046 16 24 16.8954 24 18V30C24 31.1046 23.1046 32 22 32H16C14.8954 32 14 31.1046 14 30V18Z" fill="white" fill-opacity="0.9"/>
                    <path d="M26 21L33 17V31L26 27V21Z" fill="white" fill-opacity="0.9"/>
                    <defs><linearGradient id="grad2" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
                </svg>
            </div>
            <h2>Join Room</h2>
            <p class="card-subtitle">Enter your name to join the call</p>
            <div class="input-group">
                <input type="text" id="modalUsername" placeholder="Enter your name..." maxlength="20" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="joinWithName()">Join</button>
        </div>
    </div>

    <!-- Top bar -->
    <header class="room-header">
        <div class="room-header-left">
            <div class="brand-icon tiny">
                <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="14" fill="url(#grad3)"/>
                    <path d="M14 18C14 16.8954 14.8954 16 16 16H22C23.1046 16 24 16.8954 24 18V30C24 31.1046 23.1046 32 22 32H16C14.8954 32 14 31.1046 14 30V18Z" fill="white" fill-opacity="0.9"/>
                    <path d="M26 21L33 17V31L26 27V21Z" fill="white" fill-opacity="0.9"/>
                    <defs><linearGradient id="grad3" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
                </svg>
            </div>
            <span class="room-title">Dege</span>
            <span class="room-id-badge" id="roomIdBadge"></span>
        </div>
        <div class="room-header-right">
            <span class="participant-count" id="participantCount">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                    <path d="M16 3.13a4 4 0 010 7.75"/>
                </svg>
                <span id="countText">1</span>
            </span>
            <button class="btn-icon" id="copyLinkBtn" onclick="copyRoomLink()" title="Linki Kopyala">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <span class="btn-icon-label">Invite Link</span>
            </button>
        </div>
    </header>

    <!-- Main content -->
    <main class="room-main">
        <!-- Video grid -->
        <div class="video-area">
            <div class="video-grid" id="videoGrid">
                <!-- Local video -->
                <div class="video-card local" id="localVideoCard">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">
                        <span class="video-name" id="localName">You</span>
                    </div>
                    <div class="video-no-cam" id="localNoCam" style="display:none;">
                        <div class="avatar-circle" id="localAvatar">?</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat sidebar -->
        <aside class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <h3>Chat</h3>
                <button class="btn-icon small" id="toggleChat" onclick="toggleChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-welcome">
                    <p>Welcome to the chat! 👋</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" maxlength="500">
                <button class="btn-send" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </aside>
    </main>

    <!-- Control bar -->
    <footer class="control-bar">
        <div class="controls-center">
            <button class="control-btn" id="micBtn" onclick="toggleMic()" title="Mikrofon">
                <svg class="icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                    <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
                <svg class="icon-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                    <line x1="1" y1="1" x2="23" y2="23"/>
                    <path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
                    <path d="M17 16.95A7 7 0 015 12v-2m14 0v2c0 .76-.13 1.48-.35 2.17"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>

            <button class="control-btn" id="camBtn" onclick="toggleCam()" title="Kamera">
                <svg class="icon-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
                <svg class="icon-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                    <path d="M16 16v1a2 2 0 01-2 2H3a2 2 0 01-2-2V7a2 2 0 012-2h2m5.66 0H14a2 2 0 012 2v3.34l1 1L23 7v10"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
            </button>

            <button class="control-btn" id="screenBtn" onclick="toggleScreenShare()" title="Ekran Paylaş">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
            </button>

            <button class="control-btn chat-toggle-btn" id="chatToggleBtn" onclick="toggleChat()" title="Sohbet">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                <span class="chat-badge" id="chatBadge" style="display:none;">0</span>
            </button>

            <button class="control-btn danger" id="leaveBtn" onclick="leaveRoom()" title="Ayrıl">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18.36 5.64a9 9 0 11-12.73 0"/>
                    <line x1="12" y1="2" x2="12" y2="12"/>
                </svg>
            </button>
        </div>
    </footer>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script src="/app.js"></script>
</body>
</html>
